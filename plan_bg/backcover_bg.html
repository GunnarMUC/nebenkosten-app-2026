
<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 794px; height: 1123px; background: linear-gradient(180deg, #37474F 0%, #263238 100%); position: relative; overflow: hidden; }
.grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: 
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px; }
.circle { position: absolute; width: 600px; height: 600px; border-radius: 50%; 
    background: radial-gradient(circle at 50% 50%, rgba(84,110,122,0.15), transparent 70%);
    top: 200px; left: 50%; transform: translateX(-50%); }
.line { position: absolute; width: 200px; height: 1px; 
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    top: 50%; left: 50%; transform: translateX(-50%); }
</style>
</head>
<body>
<div class="grid"></div>
<div class="circle"></div>
<div class="line"></div>
</body>
</html>


<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 794px; height: 1123px; background: #fafbfc; position: relative; overflow: hidden; }
.header-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; 
    background: linear-gradient(90deg, #37474F 0%, #546E7A 50%, #78909C 100%); }
.corner { position: absolute; top: 0; right: 0; width: 150px; height: 150px; 
    background: linear-gradient(225deg, rgba(55,71,79,0.03) 0%, transparent 60%); }
.side-accent { position: absolute; left: 0; top: 200px; width: 3px; height: 200px; 
    background: linear-gradient(180deg, rgba(84,110,122,0.15), transparent); }
</style>
</head>
<body>
<div class="header-line"></div>
<div class="corner"></div>
<div class="side-accent"></div>
</body>
</html>

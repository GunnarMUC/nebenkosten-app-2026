
<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 794px; height: 1123px; background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 50%, #dce2e9 100%); position: relative; overflow: hidden; }
.grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: 
    linear-gradient(rgba(55,71,79,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(55,71,79,0.03) 1px, transparent 1px);
    background-size: 40px 40px; }
.circle1 { position: absolute; width: 500px; height: 500px; border-radius: 50%; 
    background: radial-gradient(circle at 30% 30%, rgba(84,110,122,0.12), transparent 70%);
    top: -100px; right: -100px; }
.circle2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; 
    background: radial-gradient(circle at 70% 70%, rgba(120,144,156,0.1), transparent 70%);
    bottom: 100px; left: -80px; }
.line1 { position: absolute; width: 300px; height: 2px; 
    background: linear-gradient(90deg, transparent, rgba(55,71,79,0.15), transparent);
    top: 350px; left: 50px; transform: rotate(-15deg); }
.line2 { position: absolute; width: 250px; height: 2px; 
    background: linear-gradient(90deg, transparent, rgba(55,71,79,0.12), transparent);
    top: 380px; left: 80px; transform: rotate(-15deg); }
.dots { position: absolute; bottom: 60px; right: 60px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(55,71,79,0.2); display: inline-block; margin: 4px; }
.accent { position: absolute; width: 180px; height: 4px; background: linear-gradient(90deg, #546E7A, transparent); 
    bottom: 200px; left: 0; }
.accent2 { position: absolute; width: 120px; height: 2px; background: linear-gradient(90deg, #78909C, transparent); 
    bottom: 190px; left: 0; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="circle1"></div>
<div class="circle2"></div>
<div class="line1"></div>
<div class="line2"></div>
<div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><br>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><br>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>
<div class="accent"></div>
<div class="accent2"></div>
</body>
</html>
